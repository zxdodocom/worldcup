<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="世界杯模拟器" />
    <title>⚽ 美加墨世界杯 · 比分模拟器</title>
    <style>
        /* ===== 全局 & 背景 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            background: radial-gradient(ellipse at 50% 0%, #1a3a1a 0%, #0d1b0d 60%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .container {
            width: 100%;
            max-width: 820px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 36px 32px 40px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            box-shadow: 0 30px 60px rgba(0,0,0,.7), inset 0 0 0 1px rgba(255,255,240,.06);
        }

        /* ===== 头部 ===== */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #f7e05e, #f0c929);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(247,224,94,.25);
        }
        .header .sub {
            color: rgba(255,255,240,.45);
            font-size: 14px;
            margin-top: 4px;
            letter-spacing: 2px;
        }

        /* ===== 输入区 ===== */
        .input-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        .input-area .vs {
            color: rgba(255,255,240,.25);
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 2px;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1 1 180px;
            min-width: 120px;
            padding: 12px 18px;
            border-radius: 100px;
            border: 1px solid rgba(255,255,240,.12);
            background: rgba(255,255,240,.06);
            color: #f0eee0;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            outline: none;
            transition: .25s;
        }
        .input-area input::placeholder { color: rgba(255,255,240,.25); }
        .input-area input:focus {
            border-color: #f0c929;
            background: rgba(255,255,240,.08);
            box-shadow: 0 0 20px rgba(240,201,41,.12);
        }

        /* ===== 赛场主体 ===== */
        .pitch {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 28px;
            flex-wrap: nowrap;
        }

        /* 队伍卡片 */
        .team-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 18px 12px 20px;
            border-radius: 24px;
            background: rgba(255,255,240,.04);
            border: 1px solid rgba(255,255,240,.06);
            transition: .3s;
            min-width: 0;
        }
        .team-card.has-team {
            border-color: rgba(255,255,240,.12);
            background: rgba(255,255,240,.07);
        }

        .team-card .flag {
            width: 80px;
            height: 60px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,.45);
            background: rgba(255,255,240,.04);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: .3s;
            flex-shrink: 0;
        }
        .team-card .flag img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .team-card .flag .placeholder-icon {
            font-size: 28px;
            opacity: .25;
        }
        .team-card .team-name {
            font-size: 18px;
            font-weight: 700;
            color: #f0eee0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            text-align: center;
        }
        .team-card .team-name .gray {
            color: rgba(255,255,240,.25);
            font-weight: 400;
        }

        /* ===== 中央比分 ===== */
        .score-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-shrink: 0;
            padding: 0 6px;
        }
        .score-section {
            flex-direction: column;
        }
        .score-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .match-clock {
            font-size: 26px;
            font-weight: 700;
            color: rgba(255,255,240,.45);
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-bottom: 2px;
            transition: color .3s;
        }
        .match-clock .clock-num {
            min-width: 2.8em;
            text-align: center;
        }
        .match-clock.rolling {
            color: #f7e05e;
            animation: clockPulse .6s infinite alternate;
        }
        @keyframes clockPulse {
            0%   { opacity: .6; }
            100% { opacity: 1; }
        }
        .score-box {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            background: rgba(0,0,0,.5);
            border: 1px solid rgba(255,255,240,.10);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            font-weight: 800;
            color: #f0eee0;
            transition: .15s;
            position: relative;
            overflow: hidden;
        }
        .score-box .dice-num {
            display: inline-block;
        }
        .score-box.goal {
            animation: goalScorePop .7s cubic-bezier(.17,.67,.3,1.2);
        }
        @keyframes goalScorePop {
            0%   { transform: scale(1);     box-shadow: 0 0 0 rgba(247,224,94,0);   background: transparent; }
            25%  { transform: scale(1.55);  box-shadow: 0 0 50px rgba(247,224,94,.6); background: rgba(247,224,94,.2); color: #f7e05e; }
            55%  { transform: scale(0.92);  box-shadow: 0 0 25px rgba(247,224,94,.25); }
            80%  { transform: scale(1.08);  box-shadow: 0 0 10px rgba(247,224,94,.1); }
            100% { transform: scale(1);     box-shadow: 0 0 0 rgba(247,224,94,0);   background: transparent; color: #f0eee0; }
        }

        /* 进球全屏庆祝 */
        .goal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 99;
            opacity: 0;
            transition: opacity .12s;
        }
        .goal-overlay.show {
            opacity: 1;
        }
        .goal-overlay .flash {
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(247,224,94,.35) 0%, transparent 65%);
        }
        .goal-banner {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            transition: none;
        }
        .goal-banner.show {
            opacity: 1;
        }
        .goal-banner .goal-text {
            font-size: 80px;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f7e05e 0%, #ff8c00 50%, #f7e05e 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 30px rgba(247,224,94,.5)) drop-shadow(0 4px 8px rgba(0,0,0,.4));
            transform: scale(0) rotate(-12deg);
            animation: goalBannerPop 1s cubic-bezier(.17,.67,.3,1.2) forwards;
        }
        @keyframes goalBannerPop {
            0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
            35%  { transform: scale(1.5) rotate(5deg);  opacity: 1; }
            55%  { transform: scale(0.88) rotate(-3deg); opacity: 1; }
            75%  { transform: scale(1.06) rotate(1deg);  opacity: 1; }
            100% { transform: scale(1) rotate(0deg);   opacity: 1; }
        }

        .score-colon {
            font-size: 36px;
            font-weight: 700;
            color: rgba(255,255,240,.30);
        }
        /* 半场比分 */
        .half-time-score {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-top: 6px;
            opacity: 0;
            transition: opacity .6s;
            font-size: 13px;
        }
        .half-time-score.show {
            opacity: 1;
        }
        .half-time-score .ht-label {
            font-weight: 600;
            color: rgba(255,255,240,.30);
            letter-spacing: 1px;
        }
        .half-time-score .ht-score {
            font-weight: 700;
            color: #f0eee0;
            font-size: 15px;
            min-width: 1.2em;
            text-align: center;
        }
        .half-time-score .ht-colon {
            color: rgba(255,255,240,.30);
            font-weight: 600;
        }

        /* ===== 按钮 ===== */
        .btn-area {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
        .btn-roll {
            padding: 14px 48px;
            border-radius: 100px;
            border: none;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            background: linear-gradient(135deg, #f0c929, #d4a017);
            color: #1a2a1a;
            transition: .25s;
            box-shadow: 0 6px 24px rgba(240,201,41,.25);
            position: relative;
            overflow: hidden;
        }
        .btn-roll:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 32px rgba(240,201,41,.35);
        }
        .btn-roll:active:not(:disabled) {
            transform: translateY(0);
        }
        .btn-roll:disabled {
            opacity: .35;
            cursor: not-allowed;
            transform: none;
        }
        .btn-roll .btn-text {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== 结果 ===== */
        .result-area {
            text-align: center;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .result-text {
            font-size: 22px;
            font-weight: 700;
            color: #f7e05e;
            opacity: 0;
            transition: opacity .5s, transform .5s;
            transform: translateY(8px);
        }
        .result-text.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== 提示小字 ===== */
        .hint {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,240,.18);
            font-size: 13px;
        }

        /* ===== 响应式 ===== */
        /* 手机端主力：375px ~ 414px */
        @media (max-width: 600px) {
            .container { padding: 18px 12px 22px; }
            .header h1 { font-size: 20px; }
            .header .sub { font-size: 12px; }
            .input-area { gap: 6px; }
            .input-area input { font-size: 14px; padding: 10px 12px; min-width: 70px; flex: 1; }
            .input-area .vs { font-size: 14px; }
            .team-card { padding: 12px 8px 14px; gap: 7px; }
            .team-card .flag { width: 50px; height: 38px; }
            .team-card .team-name { font-size: 13px; }
            .score-box { width: 52px; height: 52px; font-size: 26px; border-radius: 12px; }
            .score-colon { font-size: 24px; }
            .match-clock { font-size: 20px; }
            .score-row { gap: 4px; }
            .half-time-score { font-size: 11px; margin-top: 4px; }
            .half-time-score .ht-score { font-size: 13px; }
            .btn-roll { padding: 12px 28px; font-size: 15px; width: 90%; max-width: 300px; }
            .result-text { font-size: 16px; }
            .pitch { gap: 4px; }
            .goal-banner .goal-text { font-size: 48px; }
        }
        /* 小屏手机：320px ~ 374px */
        @media (max-width: 414px) {
            .container { padding: 14px 10px 18px; }
            .header h1 { font-size: 17px; }
            .header .sub { font-size: 10px; }
            .input-area input { font-size: 12px; padding: 8px 10px; min-width: 55px; }
            .input-area .vs { font-size: 12px; }
            .team-card { padding: 10px 4px 12px; gap: 5px; }
            .team-card .flag { width: 40px; height: 30px; }
            .team-card .team-name { font-size: 11px; }
            .score-box { width: 42px; height: 42px; font-size: 22px; border-radius: 10px; }
            .score-colon { font-size: 20px; }
            .match-clock { font-size: 17px; }
            .score-row { gap: 3px; }
            .half-time-score { font-size: 10px; margin-top: 3px; }
            .half-time-score .ht-score { font-size: 11px; }
            .btn-roll { padding: 10px 20px; font-size: 13px; width: 95%; }
            .result-text { font-size: 14px; }
            .pitch { gap: 2px; }
            .goal-banner .goal-text { font-size: 36px; }
        }
        /* 防止横屏手机/平板太宽时锁死 */
        @media (min-width: 601px) and (max-width: 900px) {
            .container { max-width: 94vw; padding: 28px 20px 32px; }
            .score-box { width: 60px; height: 60px; font-size: 32px; }
            .team-card .flag { width: 64px; height: 48px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- 标题 -->
    <div class="header">
        <h1>🏆 美加墨世界杯 · 比分模拟器</h1>
        <div class="sub">FIFA World Cup 2026 · Score Simulator</div>
    </div>

    <!-- 输入 -->
    <div class="input-area">
        <input type="text" id="teamA" placeholder="主队名称" value="巴西" />
        <span class="vs">VS</span>
        <input type="text" id="teamB" placeholder="客队名称" value="阿根廷" />
    </div>

    <!-- 赛场 -->
    <div class="pitch">
        <!-- 左队 -->
        <div class="team-card" id="cardA">
            <div class="flag" id="flagA">
                <span class="placeholder-icon">🏳️</span>
            </div>
            <div class="team-name" id="nameA">
                <span class="gray">主队</span>
            </div>
        </div>

        <!-- 比分 -->
        <div class="score-section">
            <div class="match-clock" id="clockWrap">
                <span>⏱</span>
                <span class="clock-num" id="clockDisplay">0'</span>
            </div>
            <div class="score-row">
                <div class="score-box" id="scoreA"><span class="dice-num" id="numA">0</span></div>
                <span class="score-colon">:</span>
                <div class="score-box" id="scoreB"><span class="dice-num" id="numB">0</span></div>
            </div>
            <div class="half-time-score" id="halfTimeBox">
                <span class="ht-label">⚽ 上半场</span>
                <span class="ht-score" id="htA">0</span>
                <span class="ht-colon">:</span>
                <span class="ht-score" id="htB">0</span>
            </div>
            <div class="half-time-score" id="fullTimeBox">
                <span class="ht-label">🏆 全场</span>
                <span class="ht-score" id="ftA">0</span>
                <span class="ht-colon">:</span>
                <span class="ht-score" id="ftB">0</span>
            </div>
        </div>

        <!-- 右队 -->
        <div class="team-card" id="cardB">
            <div class="flag" id="flagB">
                <span class="placeholder-icon">🏳️</span>
            </div>
            <div class="team-name" id="nameB">
                <span class="gray">客队</span>
            </div>
        </div>
    </div>

    <!-- 按钮 -->
    <div class="btn-area">
        <button class="btn-roll" id="btnRoll">
            <span class="btn-text">⚽ 比赛开始！！</span>
        </button>
    </div>

    <!-- 结果 -->
    <div class="result-area">
        <div class="result-text" id="resultText">⚽ 点击上方按钮开始比赛！</div>
    </div>

</div>

<div class="goal-overlay" id="goalOverlay"><div class="flash"></div></div>
<div class="goal-banner" id="goalBanner"><span class="goal-text">⚽ GOOOAL!</span></div>

    function getRanking(name) {
        const key = name.trim();
        if (!key) return null;
        return FIFA_RANKINGS[key] || FIFA_RANKINGS[key.toLowerCase()] || null;
    }

    // 进球概率：越强（排名数字越小）越容易进球
    // 公式：对手排名 / (自己排名 + 对手排名)，上限 50%，下限 8%
    function goalChance(myRank, oppRank) {
        if (!myRank || !oppRank) return 0.30;
        const strength = oppRank / (myRank + oppRank);
        return Math.min(Math.max(strength, 0.08), 0.50);
    }

    // 进球特效：比分闪光 + 全屏 GOAL 庆祝
    function triggerGoalFlash(el) {
        el.classList.add('goal');
        setTimeout(() => el.classList.remove('goal'), 750);

        // 全屏闪光 + GOOOAL! 文字
        goalOverlay.classList.add('show');
        // 重置动画（移除再添加）
        goalBanner.classList.remove('show');
        void goalBanner.offsetHeight;
        goalBanner.classList.add('show');

        setTimeout(() => {
            goalOverlay.classList.remove('show');
            goalBanner.classList.remove('show');
        }, 1400);
    }

    // ===================================================================

    // ===================================================================
    function getFlagCode(name) {
        const key = name.trim();
        if (!key) return null;
        return COUNTRY_MAP[key] || COUNTRY_MAP[key.toLowerCase()] || null;
    }

    function renderFlag(flagEl, name, cardEl, nameEl, numEl) {
        const code = getFlagCode(name);
        if (code) {
            // 国内可用的 CDN：标准国旗用 country-flag-icons，英国各地区用 flag-icons
            const src = code.startsWith('gb-')
                ? `https://cdn.jsdelivr.net/npm/flag-icons/flags/4x3/${code}.svg`
                : `https://cdn.jsdelivr.net/npm/country-flag-icons/3x2/${code.toUpperCase()}.svg`;
            flagEl.innerHTML = `<img src="${src}" alt="${name}" loading="lazy" />`;
            cardEl.classList.add('has-team');
            nameEl.textContent = name;
            return true;
        } else {
            flagEl.innerHTML = `<span class="placeholder-icon">🏳️</span>`;
            cardEl.classList.remove('has-team');
            nameEl.textContent = name || '未输入';
            // 把名字的灰色部分去掉
            if (!name) {
                nameEl.innerHTML = `<span class="gray">未输入</span>`;
            } else {
                nameEl.textContent = name;
            }
            return false;
        }
    }

    function renderBoth() {
        const a = inputA.value.trim() || '';
        const b = inputB.value.trim() || '';
        renderFlag(flagA, a, cardA, nameA, numA);
        renderFlag(flagB, b, cardB, nameB, numB);
        // 如果分数还没生成，更新提示
        updateResultMessage();
    }

    // ===================================================================
    //  比分推演
    // ===================================================================
    function sleep(ms) {
        return new Promise(r => setTimeout(r, ms));
    }

    async function doRoll() {
        if (rolling) return;
        rolling = true;
        btnRoll.disabled = true;
        btnRoll.innerHTML = '<span class="btn-text">⚽ 比赛进行中…</span>';
        result.classList.remove('show');

        const teamNameA = inputA.value.trim() || '';
        const teamNameB = inputB.value.trim() || '';
        const rankA = getRanking(teamNameA);
        const rankB = getRanking(teamNameB);

        // 时钟脉冲
        clockWrap.classList.add('rolling');

        // 初始化比分
        let curA = 0, curB = 0;
        let halfA = null, halfB = null;
        numA.textContent = '0';
        numB.textContent = '0';
        halfTimeBox.classList.remove('show');
        fullTimeBox.classList.remove('show');

        // 每 15 分钟（15'/30'/45'/60'/75'/90'）各 ROLL 一次
        const GOAL_MINS = new Set([15, 30, 45, 60, 75, 90]);

        const TOTAL_MS = 10000;
        const TOTAL_MIN = 90;
        const tickMs = TOTAL_MS / TOTAL_MIN;

        for (let m = 1; m <= TOTAL_MIN; m++) {
            clockDisplay.textContent = m + "'";

            if (GOAL_MINS.has(m)) {
                const goalA = Math.random() < goalChance(rankA, rankB);
                const goalB = Math.random() < goalChance(rankB, rankA);
                if (goalA) { curA++; triggerGoalFlash(scoreA); }
                if (goalB) { curB++; triggerGoalFlash(scoreB); }
                numA.textContent = curA;
                numB.textContent = curB;

                // 每次 ROLL 都附加奇迹事件：1% 再进一球，0.01% 进两球
                const miracleA = Math.random();
                if (miracleA < 0.0001) {
                    curA += 2; triggerGoalFlash(scoreA); triggerGoalFlash(scoreA);
                } else if (miracleA < 0.01) {
                    curA++; triggerGoalFlash(scoreA);
                }
                const miracleB = Math.random();
                if (miracleB < 0.0001) {
                    curB += 2; triggerGoalFlash(scoreB); triggerGoalFlash(scoreB);
                } else if (miracleB < 0.01) {
                    curB++; triggerGoalFlash(scoreB);
                }
                numA.textContent = curA;
                numB.textContent = curB;
            }

            // 第 45 分钟 — 中场上半场结束，记录半场比分
            if (m === 45) {
                halfA = curA;
                halfB = curB;
                htA.textContent = halfA;
                htB.textContent = halfB;
                halfTimeBox.classList.add('show');
            }

            await sleep(tickMs);
        }

        clockWrap.classList.remove('rolling');
        clockDisplay.textContent = "90+'";

        // 记录全场比分
        ftA.textContent = curA;
        ftB.textContent = curB;
        fullTimeBox.classList.add('show');

        btnRoll.disabled = false;
        btnRoll.innerHTML = '<span class="btn-text">⚽ 比赛开始！！</span>';
        rolling = false;

        // 显示结果
        const teamA = inputA.value.trim() || '主队';
        const teamB = inputB.value.trim() || '客队';

        const halfStr = (halfA !== null) ? `⚽ 上半场 ${halfA}:${halfB}  ·  🏆 全场 ${curA}:${curB}` : `${teamA} ${curA} : ${curB} ${teamB}`;

        let outcome;
        if (curA > curB) {
            outcome = `🎉 ${teamA} 胜！`;
        } else if (curA < curB) {
            outcome = `🎉 ${teamB} 胜！`;
        } else {
            outcome = `🤝 平局！`;
        }

        result.textContent = `${halfStr} · ${outcome}`;
        result.classList.add('show');
    }

    function updateResultMessage() {
        const a = inputA.value.trim() || '主队';
        const b = inputB.value.trim() || '客队';
        if (numA.textContent === '0' && numB.textContent === '0') {
            clockDisplay.textContent = "0'";
            halfTimeBox.classList.remove('show');
            fullTimeBox.classList.remove('show');
            htA.textContent = '0';
            htB.textContent = '0';
            ftA.textContent = '0';
            ftB.textContent = '0';
            result.textContent = `⚽ 输入球队名称，点击按钮开始比赛！`;
            result.classList.add('show');
        }
    }

    // ===================================================================
    //  事件绑定
    // ===================================================================
    inputA.addEventListener('input', renderBoth);
    inputB.addEventListener('input', renderBoth);
    btnRoll.addEventListener('click', doRoll);

    // ===================================================================
    //  载入初始化
    // ===================================================================
    renderBoth();
    // 初始默认值
    setTimeout(() => {
        // 让默认值触发国旗显示
        renderBoth();
    }, 100);
