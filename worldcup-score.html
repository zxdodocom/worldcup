<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="大乱斗" />
    <title>⚽ 2026美加墨大乱斗</title>
    <style>
        /* ===== 全局 & 背景 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            background:
                /* 聚光灯束 */
                radial-gradient(ellipse at 30% 0%, rgba(255,215,0,.05) 0%, transparent 45%),
                radial-gradient(ellipse at 70% 0%, rgba(255,215,0,.04) 0%, transparent 45%),
                /* 底部微光 */
                radial-gradient(ellipse at 50% 100%, rgba(255,200,50,.08) 0%, transparent 40%),
                /* 深色底 — 暖黑 */
                linear-gradient(180deg, #1a1410 0%, #0f0c08 40%, #080604 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        /* 金色装饰线 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg,
                transparent 0%, #c8a84e 15%, #f7e05e 30%, #c8a84e 50%,
                #f7e05e 70%, #c8a84e 85%, transparent 100%
            );
            z-index: 99;
            box-shadow: 0 0 25px rgba(247,224,94,.2);
        }
        body::after {
            content: '';
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg,
                transparent 0%, #c8a84e 15%, #f7e05e 30%, #c8a84e 50%,
                #f7e05e 70%, #c8a84e 85%, transparent 100%
            );
            z-index: 99;
            box-shadow: 0 0 25px rgba(247,224,94,.2);
        }

        .container {
            width: 100%;
            max-width: 820px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 36px 32px 40px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            box-shadow: 0 30px 60px rgba(0,0,0,.7), inset 0 0 0 1px rgba(255,255,240,.06);
        }

        /* ===== 头部 ===== */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #f7e05e, #f0c929);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(247,224,94,.25);
        }
        .header .sub {
            color: rgba(255,255,240,.45);
            font-size: 14px;
            margin-top: 4px;
            letter-spacing: 2px;
        }

        /* ===== 输入区 ===== */
        .input-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        .input-area .vs {
            color: rgba(255,255,240,.25);
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 2px;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1 1 180px;
            min-width: 120px;
            padding: 12px 18px;
            border-radius: 100px;
            border: 1px solid rgba(255,255,240,.12);
            background: rgba(255,255,240,.06);
            color: #f0eee0;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            outline: none;
            transition: .25s;
        }
        .input-area input::placeholder { color: rgba(255,255,240,.25); }
        .input-area input:focus {
            border-color: #f0c929;
            background: rgba(255,255,240,.08);
            box-shadow: 0 0 20px rgba(240,201,41,.12);
        }

        /* ===== 赛场主体 ===== */
        .pitch {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 28px;
            flex-wrap: nowrap;
        }

        /* 队伍卡片 */
        .team-card {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 18px 12px 20px;
            border-radius: 24px;
            background: rgba(255,255,240,.04);
            border: 1px solid rgba(255,255,240,.06);
            transition: .3s;
            min-width: 0;
        }
        .team-card.has-team {
            border-color: rgba(255,255,240,.12);
            background: rgba(255,255,240,.07);
        }

        .team-card .flag {
            width: 80px;
            height: 60px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,.45);
            background: rgba(255,255,240,.04);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: .3s;
            flex-shrink: 0;
        }
        .team-card .flag img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .team-card .flag .placeholder-icon {
            font-size: 28px;
            opacity: .25;
        }
        .team-card .team-name {
            font-size: 18px;
            font-weight: 700;
            color: #f0eee0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            text-align: center;
        }
        .team-card .team-name .gray {
            color: rgba(255,255,240,.25);
            font-weight: 400;
        }
        .team-card .call-line {
            font-size: 11px;
            font-weight: 700;
            text-align: center;
            min-height: 16px;
            line-height: 16px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px currentColor;
            opacity: 0;
            transition: opacity .25s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }
        .team-card .call-line.show {
            opacity: 1;
        }

        /* 技能发动 — 国旗淡蓝光特效 */
        .team-card.skill-glow::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 20px;
            background: radial-gradient(ellipse at 50% 30%, rgba(0,180,255,.35) 0%, transparent 70%);
            animation: skillGlowPulse .8s ease-in-out 3;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes skillGlowPulse {
            0%   { opacity: 0.15; transform: scale(0.95); }
            50%  { opacity: 0.8;  transform: scale(1.05); }
            100% { opacity: 0.15; transform: scale(0.95); }
        }

        /* ===== 中央比分 ===== */
        .score-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-shrink: 0;
            padding: 0 6px;
        }
        .score-section {
            flex-direction: column;
        }
        .score-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .match-clock {
            font-size: 26px;
            font-weight: 700;
            color: rgba(255,255,240,.45);
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-bottom: 2px;
            transition: color .3s;
        }
        .match-clock .clock-num {
            min-width: 2.8em;
            text-align: center;
        }
        .match-clock.rolling {
            color: #f7e05e;
            animation: clockPulse .6s infinite alternate;
        }
        @keyframes clockPulse {
            0%   { opacity: .6; }
            100% { opacity: 1; }
        }
        .score-box {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            background: rgba(0,0,0,.5);
            border: 1px solid rgba(255,255,240,.10);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            font-weight: 800;
            color: #f0eee0;
            transition: .15s;
            position: relative;
            overflow: hidden;
        }
        .score-box .dice-num {
            display: inline-block;
        }
        .score-box.goal {
            animation: goalScorePop .7s cubic-bezier(.17,.67,.3,1.2);
        }
        @keyframes goalScorePop {
            0%   { transform: scale(1);     box-shadow: 0 0 0 rgba(247,224,94,0);   background: transparent; }
            25%  { transform: scale(1.55);  box-shadow: 0 0 50px rgba(247,224,94,.6); background: rgba(247,224,94,.2); color: #f7e05e; }
            55%  { transform: scale(0.92);  box-shadow: 0 0 25px rgba(247,224,94,.25); }
            80%  { transform: scale(1.08);  box-shadow: 0 0 10px rgba(247,224,94,.1); }
            100% { transform: scale(1);     box-shadow: 0 0 0 rgba(247,224,94,0);   background: transparent; color: #f0eee0; }
        }

        .score-colon {
            font-size: 36px;
            font-weight: 700;
            color: rgba(255,255,240,.30);
        }
        /* 半场比分 */
        .half-time-score {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-top: 6px;
            opacity: 0;
            transition: opacity .6s;
            font-size: 13px;
        }
        .half-time-score.show {
            opacity: 1;
        }
        .half-time-score .ht-label {
            font-weight: 600;
            color: rgba(255,255,240,.30);
            letter-spacing: 1px;
        }
        .half-time-score .ht-score {
            font-weight: 700;
            color: #f0eee0;
            font-size: 15px;
            min-width: 1.2em;
            text-align: center;
        }
        .half-time-score .ht-colon {
            color: rgba(255,255,240,.30);
            font-weight: 600;
        }

        /* ===== 按钮 ===== */
        .btn-area {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
        .btn-roll {
            padding: 14px 48px;
            border-radius: 100px;
            border: none;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            background: linear-gradient(135deg, #f0c929, #d4a017);
            color: #1a2a1a;
            transition: .25s;
            box-shadow: 0 6px 24px rgba(240,201,41,.25);
            position: relative;
            overflow: hidden;
        }
        .btn-roll:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 32px rgba(240,201,41,.35);
        }
        .btn-roll:active:not(:disabled) {
            transform: translateY(0);
        }
        .btn-roll:disabled {
            opacity: .35;
            cursor: not-allowed;
            transform: none;
        }
        .btn-roll .btn-text {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== 结果 ===== */
        .result-area {
            text-align: center;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .result-text {
            font-size: 22px;
            font-weight: 700;
            color: #f7e05e;
            opacity: 0;
            transition: opacity .5s, transform .5s;
            transform: translateY(8px);
        }
        .result-text.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== 提示小字 ===== */
        .hint {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,240,.18);
            font-size: 13px;
        }

        /* ===== 响应式 ===== */
        /* 手机端主力：375px ~ 414px */
        @media (max-width: 600px) {
            .container { padding: 18px 12px 22px; }
            .header h1 { font-size: 20px; }
            .header .sub { font-size: 12px; }
            .input-area { gap: 6px; }
            .input-area input { font-size: 14px; padding: 10px 12px; min-width: 70px; flex: 1; }
            .input-area .vs { font-size: 14px; }
            .team-card { padding: 12px 8px 14px; gap: 7px; }
            .team-card .flag { width: 50px; height: 38px; }
            .team-card .team-name { font-size: 13px; }
            .team-card .call-line { font-size: 9px; min-height: 13px; line-height: 13px; }
            .score-box { width: 52px; height: 52px; font-size: 26px; border-radius: 12px; }
            .score-colon { font-size: 24px; }
            .match-clock { font-size: 20px; }
            .score-row { gap: 4px; }
            .half-time-score { font-size: 11px; margin-top: 4px; }
            .half-time-score .ht-score { font-size: 13px; }
            .btn-roll { padding: 12px 28px; font-size: 15px; width: 90%; max-width: 300px; }
            .result-text { font-size: 16px; }
            .pitch { gap: 4px; }
        }
        /* 小屏手机：320px ~ 374px */
        @media (max-width: 414px) {
            .container { padding: 14px 10px 18px; }
            .header h1 { font-size: 17px; }
            .header .sub { font-size: 10px; }
            .input-area input { font-size: 12px; padding: 8px 10px; min-width: 55px; }
            .input-area .vs { font-size: 12px; }
            .team-card { padding: 10px 4px 12px; gap: 5px; }
            .team-card .flag { width: 40px; height: 30px; }
            .team-card .team-name { font-size: 11px; }
            .score-box { width: 42px; height: 42px; font-size: 22px; border-radius: 10px; }
            .score-colon { font-size: 20px; }
            .match-clock { font-size: 17px; }
            .score-row { gap: 3px; }
            .half-time-score { font-size: 10px; margin-top: 3px; }
            .half-time-score .ht-score { font-size: 11px; }
            .btn-roll { padding: 10px 20px; font-size: 13px; width: 95%; }
            .result-text { font-size: 14px; }
            .pitch { gap: 2px; }
        }
        /* 防止横屏手机/平板太宽时锁死 */
        @media (min-width: 601px) and (max-width: 900px) {
            .container { max-width: 94vw; padding: 28px 20px 32px; }
            .score-box { width: 60px; height: 60px; font-size: 32px; }
            .team-card .flag { width: 64px; height: 48px; }
        }
    </style>
</head>

</div>

        const total = atk + def;
        const strength = atk / total;
        const prob = 0.07 + (strength * strength * 0.22);
        return Math.min(Math.max(prob, 0.07), 0.29);

    function renderFlag(flagEl, name, cardEl, nameEl, numEl) {
        const code = getFlagCode(name);
        if (code) {
            // 国内可用的 CDN：标准国旗用 country-flag-icons，英国各地区用 flag-icons
            const src = code.startsWith('gb-')
                ? `https://cdn.jsdelivr.net/npm/flag-icons/flags/4x3/${code}.svg`
                : `https://cdn.jsdelivr.net/npm/country-flag-icons/3x2/${code.toUpperCase()}.svg`;
            flagEl.innerHTML = `<img src="${src}" alt="${name}" loading="lazy" />`;
            cardEl.classList.add('has-team');
            nameEl.textContent = name;
            return true;
        } else {
            flagEl.innerHTML = `<span class="placeholder-icon">🏳️</span>`;
            cardEl.classList.remove('has-team');
            nameEl.textContent = name || '未输入';
            // 把名字的灰色部分去掉
            if (!name) {
                nameEl.innerHTML = `<span class="gray">未输入</span>`;
            } else {
                nameEl.textContent = name;
            }
            return false;
        }

    async function doRoll() {
        if (rolling) return;
        rolling = true;
        btnRoll.disabled = true;
        btnRoll.innerHTML = '<span class="btn-text">⚽ 比赛进行中…</span>';
        result.classList.remove('show');

        const teamNameA = inputA.value.trim() || '';
        const teamNameB = inputB.value.trim() || '';
        const rawStatsA = getTeamStats(teamNameA);
        const rawStatsB = getTeamStats(teamNameB);
        const statsA = rawStatsA || [75,75,75];
        const statsB = rawStatsB || [75,75,75];
        const rankA = getRanking(teamNameA);
        const rankB = getRanking(teamNameB);

        // --- 检查是否48支参赛队 ---
        if (!rawStatsA) {
            rolling = false; btnRoll.disabled = false;
            btnRoll.innerHTML = '<span class="btn-text">⚽ 比赛开始！！</span>';
            alert('⚠️ ' + (teamNameA || '?') + ' 在家玩泥巴！'); return;
        }
        if (!rawStatsB) {
            rolling = false; btnRoll.disabled = false;
            btnRoll.innerHTML = '<span class="btn-text">⚽ 比赛开始！！</span>';
            alert('⚠️ ' + (teamNameB || '?') + ' 在家玩泥巴！'); return;
        }

        // 时钟脉冲
        clockWrap.classList.add('rolling');

        // 初始化比分
        let curA = 0, curB = 0;
        let halfA = null, halfB = null;
        numA.textContent = '0';
        numB.textContent = '0';
        halfTimeBox.classList.remove('show');
        fullTimeBox.classList.remove('show');
        // 三行通知清零
        [cA1,cA2,cA3,cB1,cB2,cB3].forEach(el => { el.classList.remove('show'); el.textContent = ''; });
        // 清空上半场/全场文字，防止缓存残留
        htA.textContent = '0'; htB.textContent = '0';
        ftA.textContent = '0'; ftB.textContent = '0';

        // 每 10 分钟（10'/20'/30'/40'/50'/60'/70'/80'/90'）各 ROLL 一次
        const GOAL_MINS = new Set([10, 20, 30, 40, 50, 60, 70, 80, 90]);

        const TOTAL_MS = 10000;
        const TOTAL_MIN = 90;
        const tickMs = TOTAL_MS / TOTAL_MIN;

        for (let m = 1; m <= TOTAL_MIN; m++) {
            clockDisplay.textContent = m + "'";

            if (GOAL_MINS.has(m)) {
                // --- 技能判定（10%概率发动）---
                let atkBoostA = 0, defBoostA = 0, agiBoostA = 0;
                let atkBoostB = 0, defBoostB = 0, agiBoostB = 0;
                let skillNameA = '', skillNameB = '';

                const sdA = getSkillData(teamNameA);
                if (sdA && Math.random() < 0.10) {
                    atkBoostA = sdA[1]; defBoostA = sdA[2]; agiBoostA = sdA[3];
                    skillNameA = sdA[0];
                    triggerSkill(teamNameA, skillNameA, true);
                }
                const sdB = getSkillData(teamNameB);
                if (sdB && Math.random() < 0.10) {
                    atkBoostB = sdB[1]; defBoostB = sdB[2]; agiBoostB = sdB[3];
                    skillNameB = sdB[0];
                    triggerSkill(teamNameB, skillNameB, false);
                }

                // --- 计算有效攻击/防御/敏捷（含技能加成）---
                const baseAtkA = statsA[0], baseDefA = statsA[1], baseAgiA = statsA[2];
                const baseAtkB = statsB[0], baseDefB = statsB[1], baseAgiB = statsB[2];
                const effAtkA = Math.min(baseAtkA + atkBoostA, 100);
                const effDefA = Math.min(baseDefA + defBoostA, 100);
                const effAgiA = Math.min(baseAgiA + agiBoostA, 100);
                const effAtkB = Math.min(baseAtkB + atkBoostB, 100);
                const effDefB = Math.min(baseDefB + defBoostB, 100);
                const effAgiB = Math.min(baseAgiB + agiBoostB, 100);

                // --- 进球 ROLL ---
                const goalA = Math.random() < goalChance(effAtkA, effDefB);
                const goalB = Math.random() < goalChance(effAtkB, effDefA);
                if (goalA) { curA++; triggerGoalFlash(scoreA); }
                if (goalB) { curB++; triggerGoalFlash(scoreB); }
                numA.textContent = curA;
                numB.textContent = curB;

                // --- 暴击判定（敏捷影响）---
                const critRateA = 0.002 + (effAgiA / 100) * 0.028;
                const critRateB = 0.002 + (effAgiB / 100) * 0.028;
                if (curA < 5 && Math.random() < critRateA) {
                    const add = Math.min(2, 5 - curA);
                    curA += add; triggerCrit(scoreA);
                }
                if (curB < 5 && Math.random() < critRateB) {
                    const add = Math.min(2, 5 - curB);
                    curB += add; triggerCrit(scoreB);
                }
                numA.textContent = curA;
                numB.textContent = curB;
            }

            // 第 45 分钟 — 中场上半场结束，记录半场比分
            if (m === 45) {
                halfA = curA;
                halfB = curB;
                htA.textContent = halfA;
                htB.textContent = halfB;
                halfTimeBox.classList.add('show');
            }

            await sleep(tickMs);
        }

        clockWrap.classList.remove('rolling');
        clockDisplay.textContent = "90+'";

        // 记录全场比分
        ftA.textContent = curA;
        ftB.textContent = curB;
        fullTimeBox.classList.add('show');

        btnRoll.disabled = false;
        btnRoll.innerHTML = '<span class="btn-text">⚽ 比赛开始！！</span>';
        rolling = false;

        // 显示结果
        const teamA = inputA.value.trim() || '主队';
        const teamB = inputB.value.trim() || '客队';

        const halfStr = (halfA !== null) ? `⚽ 上半场 ${halfA}:${halfB}  ·  🏆 全场 ${curA}:${curB}` : `${teamA} ${curA} : ${curB} ${teamB}`;

        let outcome;
        if (curA > curB) {
            outcome = `🎉 ${teamA} 胜！`;
        } else if (curA < curB) {
            outcome = `🎉 ${teamB} 胜！`;
        } else {
            outcome = `🤝 平局！`;
        }

        result.textContent = `${halfStr} · ${outcome}`;
        result.classList.add('show');
    }

    function updateResultMessage() {
        const a = inputA.value.trim() || '主队';
        const b = inputB.value.trim() || '客队';
        clockDisplay.textContent = "0'";
        halfTimeBox.classList.remove('show');
        fullTimeBox.classList.remove('show');
        skillCallA.classList.remove('show'); skillCallA.textContent = '';
        skillCallB.classList.remove('show'); skillCallB.textContent = '';
        htA.textContent = '0'; htB.textContent = '0';
        ftA.textContent = '0'; ftB.textContent = '0';
        numA.textContent = '0'; numB.textContent = '0';
        result.textContent = `⚽ 输入球队名称，点击按钮开始比赛！`;
        result.classList.add('show');
    }

    // ===================================================================
    //  事件绑定
    // ===================================================================
    inputA.addEventListener('input', renderBoth);
    inputB.addEventListener('input', renderBoth);
    btnRoll.addEventListener('click', doRoll);

    // ===================================================================
    //  载入初始化
    // ===================================================================
    renderBoth();
    // 初始默认值
    setTimeout(() => {
        // 让默认值触发国旗显示
        renderBoth();
    }, 100);
